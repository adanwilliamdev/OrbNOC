services:
  postgres:
    image: postgres:15-alpine
    container_name: orbnoc-db
    environment:
      POSTGRES_DB: orbnoc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orbnoc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orbnoc"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: orbnoc-backend
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/orbnoc
      JWT_SECRET: change_this_in_production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orbnoc-network

  frontend:
    build:
      context: ./frontend
    container_name: orbnoc-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - orbnoc-network

volumes:
  postgres_data:

networks:
  orbnoc-network:
    driver: bridge
